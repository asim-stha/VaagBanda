function calcBalances(group) {
  const bal = {};
  group.members.forEach(m => bal[m] = 0);
  group.expenses.forEach(exp => {
    bal[exp.paidBy] += exp.amount;
    Object.entries(exp.splits).forEach(([uid, amt]) => { bal[uid] -= amt; });
  });
  group.settlements.forEach(s => { bal[s.from] += s.amount; bal[s.to] -= s.amount; });
  return bal;
}

    if (!password) return { level: 0, label: "", color: GRAY200 };
    let s = 0;

    if (/[0-9]/.test(password)) s++;

    if (password.length >= 12) s++;
    if (s <= 1) return { level: 1, label: "Weak", color: "#E74C3C" };
    if (s <= 3) return { level: 2, label: "Good", color: "#F39C12" };

/* ─── ADD EXPENSE ─── 
   Splitwise-inspired layout: hero amount input on top, form rows below,
   split-method pills, member shares preview, save CTA pinned at bottom.
   Implements SRS §4.3 — Expense Entry & Splitting. */
const AddExpenseScreen = ({ groups, defaultGroupId, prefill, onClose, onSave, onOpenScan }) => {
  const [groupId, setGroupId] = useState(defaultGroupId || groups[0]?.id);
  const [amount, setAmount] = useState(prefill?.amount ? String(prefill.amount) : "");
  const [desc, setDesc] = useState(prefill?.desc || "");
  const [paidBy, setPaidBy] = useState(ME.id);
  const [date, setDate] = useState(prefill?.date || todayStr());
  const [cat, setCat] = useState(prefill?.cat || "food");
  const [splitMethod, setSplitMethod] = useState("equal"); // equal | exact | percent | shares
  const [showGroupPicker, setShowGroupPicker] = useState(false);
  const [showCatPicker, setShowCatPicker] = useState(false);
  const [showPayerPicker, setShowPayerPicker] = useState(false);

  const group = groups.find(g => g.id === groupId);
  const memberObjs = group ? group.members.map(getUserObj) : [];
  const numericAmount = parseFloat(amount) || 0;

  // Equal split calculation (with rounding remainder going to payer per SRS §4.3.3)
  const equalSplits = (() => {
    if (!group || !numericAmount) return {};
    const n = group.members.length;
    const base = Math.floor((numericAmount / n) * 100) / 100;
    const remainder = Math.round((numericAmount - base * n) * 100) / 100;
    const splits = {};
    group.members.forEach((m, i) => {
      splits[m] = m === paidBy ? base + remainder : base;
    });
    return splits;
  })();

  const canSave = numericAmount > 0 && desc.trim().length > 0 && group;

  const handleSave = () => {
    if (!canSave) return;
    const newExpense = {
      id: "e" + Date.now(),
      desc: desc.trim(),
      amount: numericAmount,
      paidBy,
      date,
      cat,
      splits: equalSplits,
    };
    onSave(groupId, newExpense);
    onClose();
  };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: GHOST, overflow: "hidden", animation: "slideUp 0.3s ease" }}>
      {/* Header */}
      <div style={{
        background: `linear-gradient(135deg, ${BLUE_DARK} 0%, ${BLUE} 60%, ${BLUE_MID} 100%)`,
        padding: "16px 20px 24px", position: "relative", overflow: "hidden",

        <div style={{ position: "absolute", top: -30, right: -30, width: 120, height: 120, borderRadius: "50%", background: `${CRIMSON}15` }}/>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", position: "relative", zIndex: 1 }}>
          <div onClick={onClose} style={{
            width: 36, height: 36, borderRadius: 10, background: `${WHITE}15`,
            display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
          }}>
            <Icon name="close" size={18} color={WHITE}/>
          </div>
          <div style={{ color: WHITE, fontSize: 16, fontWeight: 700, fontFamily: "'DM Sans', sans-serif" }}>New Expense</div>
          <div onClick={onOpenScan} style={{
            width: 36, height: 36, borderRadius: 10, background: `${CRIMSON}`,
            display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
            boxShadow: `0 4px 12px ${CRIMSON}50`,
          }} title="Scan receipt">
            <Icon name="camera" size={18} color={WHITE}/>
          </div>
        </div>

        {/* Amount input */}
        <div style={{ marginTop: 20, textAlign: "center", position: "relative", zIndex: 1 }}>
          <div style={{ color: `${WHITE}70`, fontSize: 11, fontWeight: 600, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>
            Amount in {group?.currency || "NPR"}
          </div>
          <div style={{ display: "flex", alignItems: "baseline", justifyContent: "center", gap: 8 }}>
            <span style={{ color: `${WHITE}70`, fontSize: 22, fontWeight: 600, fontFamily: "'DM Sans', sans-serif" }}>{group?.currency || "NPR"}</span>
            <input
              type="number"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
              placeholder="0"
              style={{
                width: 200, background: "transparent", border: "none", outline: "none",
                color: WHITE, fontSize: 48, fontWeight: 800, textAlign: "center",

              }}

/* ─── CREATE GROUP ─── 
   Working group-creation flow. User picks an emoji, name, currency, category,
   selects members from the contact list, and on save the new group is added
   to state with empty expenses & settlements. Implements SRS §4.2 — Group Management. */
const CreateGroupScreen = ({ onClose, onCreate }) => {
  const EMOJI_OPTIONS = ["🏔️","🏠","🍕","✈️","🎬","🎂","🏖️","🚗","🎓","💼","🎉","🛒"];
  const CURRENCY_OPTIONS = ["NPR","USD","EUR","INR","KRW"];
  const CATEGORY_OPTIONS = [
    { key: "trip", label: "Trip" },
    { key: "household", label: "Household" },
    { key: "event", label: "Event" },
    { key: "couple", label: "Couple" },
    { key: "other", label: "Other" },
  ];

  const [name, setName] = useState("");
  const [emoji, setEmoji] = useState("🏔️");
  const [currency, setCurrency] = useState("NPR");
  const [category, setCategory] = useState("trip");
  const [selectedMembers, setSelectedMembers] = useState([ME.id]); // creator pre-selected
  const [nameFocus, setNameFocus] = useState(false);

  const toggleMember = (id) => {
    if (id === ME.id) return; // can't deselect self
    setSelectedMembers(prev =>
      prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]
    );
  };

  const canCreate = name.trim().length > 0 && selectedMembers.length >= 2;

  const handleCreate = () => {
    if (!canCreate) return;
    const newGroup = {
      id: "g" + Date.now(),
      name: name.trim(),
      category,
      currency,
      emoji,
      members: selectedMembers,
      expenses: [],
      settlements: [],
    };
    onCreate(newGroup);
    onClose();
  };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: GHOST, overflow: "hidden", animation: "slideUp 0.3s ease" }}>
      {/* Header */}
      <div style={{
        background: `linear-gradient(135deg, ${BLUE_DARK} 0%, ${BLUE} 60%, ${CRIMSON_DARK} 100%)`,
        padding: "16px 20px 28px", position: "relative", overflow: "hidden",
      }}>
        <div style={{ position: "absolute", top: -30, right: -30, width: 130, height: 130, borderRadius: "50%", background: `${WHITE}10` }}/>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", position: "relative", zIndex: 1 }}>
          <div onClick={onClose} style={{
            width: 36, height: 36, borderRadius: 10, background: `${WHITE}15`,
            display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
          }}>
            <Icon name="close" size={18} color={WHITE}/>
          </div>
          <div style={{ color: WHITE, fontSize: 16, fontWeight: 700, fontFamily: "'DM Sans', sans-serif" }}>New Group</div>
          <div style={{ width: 36 }}/>
        </div>

        {/* Selected emoji preview */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginTop: 14, position: "relative", zIndex: 1 }}>
          <div style={{
            width: 76, height: 76, borderRadius: 22, background: WHITE,
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 40,
            boxShadow: `0 10px 30px rgba(0,0,0,0.25)`, marginBottom: 8,
          }}>{emoji}</div>
          <div style={{ color: `${WHITE}80`, fontSize: 11, fontFamily: "'DM Sans', sans-serif", letterSpacing: 1, textTransform: "uppercase" }}>
            Tap below to change icon
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflow: "auto", padding: "16px 20px 100px" }}>
        {/* Emoji picker */}
        <div style={{
          display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8,
          background: WHITE, borderRadius: 14, padding: 12,
          border: `1px solid ${GRAY100}`, marginBottom: 14,
        }}>
          {EMOJI_OPTIONS.map(em => (
            <div key={em} onClick={() => setEmoji(em)} style={{
              aspectRatio: "1", display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 22, cursor: "pointer", borderRadius: 10,
              background: emoji === em ? `${CRIMSON}15` : "transparent",
              border: `1.5px solid ${emoji === em ? CRIMSON : "transparent"}`,
              transition: "all 0.15s",
            }}>{em}</div>
          ))}
        </div>

        {/* Name */}
        <div style={{ fontSize: 11, fontWeight: 700, color: GRAY600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>Group Name</div>
        <div style={{
          display: "flex", alignItems: "center", gap: 12, background: WHITE,
          border: `1.5px solid ${nameFocus ? CRIMSON : GRAY200}`, borderRadius: 14, padding: "14px 16px",
          transition: "all 0.2s", boxShadow: nameFocus ? `0 0 0 4px ${CRIMSON}15` : "none", marginBottom: 14,
        }}>
          <Icon name="tag" size={18} color={nameFocus ? CRIMSON : GRAY400}/>
          <input
            value={name} onChange={(e) => setName(e.target.value)}
            onFocus={() => setNameFocus(true)} onBlur={() => setNameFocus(false)}
            placeholder="e.g. Bali Trip 2026"
            style={{
              flex: 1, border: "none", outline: "none", background: "transparent",
              fontSize: 14, fontFamily: "'DM Sans', sans-serif", color: GRAY800, fontWeight: 500,
            }}
          />
        </div>

        {/* Currency + Category */}
        <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: GRAY600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>Currency</div>
            <div style={{
              display: "flex", flexWrap: "wrap", gap: 6,
              background: WHITE, padding: 6, borderRadius: 12, border: `1px solid ${GRAY100}`,
            }}>
              {CURRENCY_OPTIONS.map(c => (
                <div key={c} onClick={() => setCurrency(c)} style={{
                  padding: "8px 10px", borderRadius: 8, cursor: "pointer",
                  fontSize: 11, fontWeight: 700, fontFamily: "'DM Sans', sans-serif",
                  background: currency === c ? `${CRIMSON}` : "transparent",
                  color: currency === c ? WHITE : GRAY600,
                  transition: "all 0.15s",
                }}>{c}</div>
              ))}
            </div>
          </div>
        </div>

        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: GRAY600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>Category</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {CATEGORY_OPTIONS.map(c => (
              <div key={c.key} onClick={() => setCategory(c.key)} style={{
                padding: "8px 14px", borderRadius: 100, cursor: "pointer",
                fontSize: 12, fontWeight: 600, fontFamily: "'DM Sans', sans-serif",
                background: category === c.key ? CRIMSON : WHITE,
                color: category === c.key ? WHITE : GRAY800,
                border: `1px solid ${category === c.key ? CRIMSON : GRAY200}`,
                transition: "all 0.15s",
              }}>{c.label}</div>
            ))}
          </div>
        </div>

        {/* Members */}
        <div style={{ fontSize: 11, fontWeight: 700, color: GRAY600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>
          Members <span style={{ color: CRIMSON, marginLeft: 4 }}>({selectedMembers.length})</span>
        </div>
        <div style={{ background: WHITE, borderRadius: 14, border: `1px solid ${GRAY100}`, overflow: "hidden" }}>
          {USERS.map((u, i) => {
            const selected = selectedMembers.includes(u.id);
            const isMe = u.id === ME.id;
            return (
              <div key={u.id} onClick={() => toggleMember(u.id)} style={{
                display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
                borderBottom: i < USERS.length - 1 ? `1px solid ${GRAY100}` : "none",
                cursor: isMe ? "default" : "pointer",
                background: selected ? `${CRIMSON}06` : "transparent",
                transition: "background 0.15s",
              }}>
                <Avatar user={u} size={36}/>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: GRAY800, fontFamily: "'DM Sans', sans-serif" }}>
                    {isMe ? "You" : u.name} {isMe && <span style={{ fontSize: 10, color: GRAY400, fontWeight: 500 }}>· creator</span>}
                  </div>
                </div>
                <div style={{
                  width: 22, height: 22, borderRadius: 6,
                  border: `2px solid ${selected ? CRIMSON : GRAY400}`,
                  background: selected ? CRIMSON : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "all 0.15s",
                  opacity: isMe ? 0.5 : 1,
                }}>
                  {selected && <Icon name="check" size={13} color={WHITE}/>}
                </div>
              </div>
            );
          })}
        </div>
        {selectedMembers.length < 2 && (
          <div style={{ fontSize: 11, color: WARN, fontFamily: "'DM Sans', sans-serif", marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
            ⚠ Select at least one other member
          </div>
        )}
      </div>

      {/* Save CTA */}
      <div style={{
        position: "absolute", bottom: 0, left: 0, right: 0,
        padding: "14px 20px 18px", background: `linear-gradient(180deg, transparent, ${WHITE} 30%)`,
      }}>
        <button onClick={handleCreate} disabled={!canCreate} style={{
          width: "100%", padding: "16px",
          background: canCreate ? `linear-gradient(135deg, ${CRIMSON} 0%, ${CRIMSON_DARK} 100%)` : GRAY200,
          color: canCreate ? WHITE : GRAY400, border: "none", borderRadius: 14,
          fontSize: 15, fontWeight: 700, fontFamily: "'DM Sans', sans-serif",
          letterSpacing: 0.3, cursor: canCreate ? "pointer" : "not-allowed",
          boxShadow: canCreate ? `0 10px 24px ${CRIMSON}40` : "none", transition: "all 0.2s",
        }}>
          Create Group
        </button>
      </div>
    </div>
  );
};

/* ─── SETTLE UP ─── 
   Working settlement flow. Lists all the people the user owes (or is owed by)
   in this group, lets the user pick one + payment method + amount, and on save
   adds a settlement record that updates balances. Implements SRS §4.5 — Settlement. */
const SettleUpScreen = ({ group, expensePrefill, onClose, onSettle }) => {
  const balances = calcBalances(group);
  const myBal = balances[ME.id] || 0;

  // Determine who I owe (negative) and who owes me (positive).
  // For settlement we list the *opposite-sign* members vs. me so we can settle.
  const candidates = group.members
    .filter(uid => uid !== ME.id)
    .map(uid => ({ user: getUserObj(uid), balance: balances[uid] || 0 }))
    .filter(c => c.balance !== 0);

  // If launched from a specific expense, default the target to that expense's payer
  // (and prefill the amount with the user's share of that expense).
  const initialTargetId = (() => {
    if (expensePrefill && expensePrefill.paidBy && expensePrefill.paidBy !== ME.id) {
      const inCandidates = candidates.find(c => c.user.id === expensePrefill.paidBy);
      if (inCandidates) return expensePrefill.paidBy;
    }
    return candidates[0]?.user.id || null;
  })();
  const initialAmount = (() => {
    if (expensePrefill && expensePrefill.splits && expensePrefill.splits[ME.id] != null) {
      return String(expensePrefill.splits[ME.id]);
    }
    return "";
  })();
  const [targetId, setTargetId] = useState(initialTargetId);
  const [method, setMethod] = useState("cash"); // cash | bank | upi | esewa | khalti | other
  const [amount, setAmount] = useState(initialAmount);

  const target = candidates.find(c => c.user.id === targetId);
  const targetBal = target?.balance || 0;
  // If target has positive balance (others owe me), settling means they pay me.
  // If target has negative balance, I owe them and I pay.
  const direction = targetBal > 0 ? "incoming" : "outgoing";
  const suggestedAmount = Math.abs(targetBal);

  // Pre-fill amount when target changes
  useEffect(() => {
    if (target) setAmount(String(suggestedAmount));
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [targetId]);

  const numericAmount = parseFloat(amount) || 0;
  const canSettle = target && numericAmount > 0;

  const METHODS = [
    { key: "cash", label: "Cash", emoji: "💵" },
    { key: "bank", label: "Bank", emoji: "🏦" },
    { key: "upi", label: "UPI", emoji: "📱" },
    { key: "esewa", label: "eSewa", emoji: "💚" },
    { key: "khalti", label: "Khalti", emoji: "💜" },
    { key: "other", label: "Other", emoji: "✨" },
  ];

  const handleSettle = () => {
    if (!canSettle) return;
    const settlement = {
      id: "s" + Date.now(),
      from: direction === "incoming" ? target.user.id : ME.id,
      to:   direction === "incoming" ? ME.id : target.user.id,
      amount: numericAmount,
      method,
      date: todayStr(),
    };
    onSettle(group.id, settlement);
    onClose();
  };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: GHOST, overflow: "hidden", animation: "slideUp 0.3s ease" }}>
      {/* Header */}
      <div style={{
        background: `linear-gradient(135deg, #1E8E47 0%, ${SUCCESS} 60%, ${BLUE_MID} 100%)`,
        padding: "16px 20px 28px", position: "relative", overflow: "hidden",
      }}>
        <div style={{ position: "absolute", top: -30, right: -30, width: 130, height: 130, borderRadius: "50%", background: `${WHITE}12` }}/>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", position: "relative", zIndex: 1 }}>
          <div onClick={onClose} style={{
            width: 36, height: 36, borderRadius: 10, background: `${WHITE}15`,
            display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
          }}>
            <Icon name="close" size={18} color={WHITE}/>
          </div>
          <div style={{ color: WHITE, fontSize: 16, fontWeight: 700, fontFamily: "'DM Sans', sans-serif" }}>Settle Up</div>
          <div style={{ width: 36 }}/>
        </div>
        <div style={{ marginTop: 14, position: "relative", zIndex: 1 }}>
          <div style={{ color: `${WHITE}80`, fontSize: 11, fontFamily: "'DM Sans', sans-serif", letterSpacing: 1, textTransform: "uppercase" }}>In {group.name}</div>
          <div style={{ color: WHITE, fontSize: 24, fontWeight: 800, fontFamily: "'Playfair Display', serif", marginTop: 4 }}>
            {myBal === 0 ? "You're all settled up" :
             myBal > 0 ? `You're owed ${fmt(myBal)}` :
             `You owe ${fmt(Math.abs(myBal))}`}
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflow: "auto", padding: "16px 20px 100px" }}>
        {expensePrefill && (
          <div style={{
            display: "flex", alignItems: "center", gap: 10, padding: "10px 12px",
            background: `linear-gradient(135deg, ${SUCCESS}10, ${BLUE}06)`,
            border: `1px dashed ${SUCCESS}50`, borderRadius: 12, marginBottom: 14,
          }}>
            <div style={{ fontSize: 18 }}>{(CATEGORIES[expensePrefill.cat] || CATEGORIES.other).icon}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 11, color: GRAY600, fontFamily: "'DM Sans', sans-serif", letterSpacing: 0.4 }}>SETTLING FOR</div>
              <div style={{ fontSize: 13, color: GRAY800, fontWeight: 700, fontFamily: "'DM Sans', sans-serif", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {expensePrefill.desc}
              </div>
            </div>
            <div style={{ fontSize: 13, fontWeight: 800, color: SUCCESS, fontFamily: "'DM Sans', sans-serif" }}>
              {fmt(expensePrefill.amount)}
            </div>
          </div>
        )}
        {candidates.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 20px" }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: GRAY800, fontFamily: "'DM Sans', sans-serif", marginBottom: 4 }}>All clear!</div>
            <div style={{ fontSize: 13, color: GRAY600, fontFamily: "'DM Sans', sans-serif" }}>
              Nobody in this group owes anyone right now.
            </div>
          </div>
        ) : (
          <>
            {/* Pick person */}
            <div style={{ fontSize: 11, fontWeight: 700, color: GRAY600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>Settle with</div>
            <div style={{ background: WHITE, borderRadius: 14, border: `1px solid ${GRAY100}`, overflow: "hidden", marginBottom: 16 }}>
              {candidates.map((c, i) => {
                const sel = c.user.id === targetId;
                return (
                  <div key={c.user.id} onClick={() => setTargetId(c.user.id)} style={{
                    display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
                    borderBottom: i < candidates.length - 1 ? `1px solid ${GRAY100}` : "none",
                    background: sel ? `${SUCCESS}08` : "transparent",
                    cursor: "pointer", transition: "background 0.15s",
                  }}>
                    <Avatar user={c.user} size={36}/>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: GRAY800, fontFamily: "'DM Sans', sans-serif" }}>{c.user.name}</div>
                      <div style={{ fontSize: 11, color: GRAY600, fontFamily: "'DM Sans', sans-serif", marginTop: 2 }}>
                        {c.balance > 0 ? "Owes you" : "You owe them"}
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{
                        fontSize: 14, fontWeight: 800, fontFamily: "'DM Sans', sans-serif",
                        color: c.balance > 0 ? SUCCESS : CRIMSON,
                      }}>
                        {c.balance >= 0 ? "+" : ""}{fmt(c.balance)}
                      </div>
                      <div style={{ fontSize: 9, color: GRAY400, textTransform: "uppercase", letterSpacing: 0.5, fontFamily: "'DM Sans', sans-serif" }}>{group.currency}</div>
                    </div>
                    <div style={{
                      width: 22, height: 22, borderRadius: "50%",
                      border: `2px solid ${sel ? SUCCESS : GRAY400}`,
                      background: sel ? SUCCESS : "transparent",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      marginLeft: 4,
                    }}>
                      {sel && <Icon name="check" size={12} color={WHITE}/>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Amount */}
            <div style={{ fontSize: 11, fontWeight: 700, color: GRAY600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>Amount</div>
            <div style={{
              background: WHITE, borderRadius: 14, border: `1px solid ${GRAY100}`,
              padding: "14px 16px", marginBottom: 16,
              display: "flex", alignItems: "center", gap: 8,
            }}>
              <span style={{ fontSize: 14, color: GRAY600, fontWeight: 600, fontFamily: "'DM Sans', sans-serif" }}>{group.currency}</span>
              <input
                type="number" value={amount} onChange={(e) => setAmount(e.target.value)}
                placeholder="0"
                style={{
                  flex: 1, border: "none", outline: "none", background: "transparent",
                  fontSize: 22, fontWeight: 800, color: GRAY800, fontFamily: "'DM Sans', sans-serif",
                  letterSpacing: -0.5,
                }}
              />
              {target && numericAmount !== suggestedAmount && (
                <div onClick={() => setAmount(String(suggestedAmount))} style={{
                  padding: "4px 10px", borderRadius: 8, background: `${SUCCESS}15`,
                  fontSize: 10, color: SUCCESS, fontWeight: 700, cursor: "pointer",
                  fontFamily: "'DM Sans', sans-serif",
                }}>
                  Full ({fmt(suggestedAmount)})
                </div>
              )}
            </div>

            {/* Method */}
            <div style={{ fontSize: 11, fontWeight: 700, color: GRAY600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>Payment Method</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
              {METHODS.map(m => (
                <div key={m.key} onClick={() => setMethod(m.key)} style={{
                  padding: "12px 6px", borderRadius: 12, textAlign: "center", cursor: "pointer",
                  background: method === m.key ? `${SUCCESS}10` : WHITE,
                  border: `1.5px solid ${method === m.key ? SUCCESS : GRAY200}`,
                  transition: "all 0.15s",
                }}>
                  <div style={{ fontSize: 22, marginBottom: 2 }}>{m.emoji}</div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: method === m.key ? SUCCESS : GRAY800, fontFamily: "'DM Sans', sans-serif" }}>{m.label}</div>
                </div>
              ))}
            </div>

            {/* Summary */}
            {target && numericAmount > 0 && (
              <div style={{
                marginTop: 18, padding: "12px 14px", borderRadius: 12,
                background: `linear-gradient(135deg, ${SUCCESS}10, ${BLUE}05)`,
                border: `1px dashed ${SUCCESS}50`,
                fontSize: 12, color: GRAY800, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.6,
              }}>
                {direction === "incoming"
                  ? <span><b>{target.user.name}</b> pays <b>you</b> {group.currency} {fmt(numericAmount)}</span>
                  : <span><b>You</b> pay <b>{target.user.name}</b> {group.currency} {fmt(numericAmount)}</span>}
                <div style={{ fontSize: 10, color: GRAY600, marginTop: 4 }}>
                  via {METHODS.find(m => m.key === method)?.label} · recorded only — no real payment is processed
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {/* Save CTA */}
      <div style={{
        position: "absolute", bottom: 0, left: 0, right: 0,
        padding: "14px 20px 18px", background: `linear-gradient(180deg, transparent, ${WHITE} 30%)`,
      }}>
        <button onClick={candidates.length === 0 ? onClose : handleSettle} disabled={candidates.length > 0 && !canSettle} style={{
          width: "100%", padding: "16px",
          background: candidates.length === 0
            ? `linear-gradient(135deg, ${BLUE} 0%, ${BLUE_DARK} 100%)`
            : (canSettle ? `linear-gradient(135deg, ${SUCCESS} 0%, #1E8E47 100%)` : GRAY200),
          color: (candidates.length === 0 || canSettle) ? WHITE : GRAY400,
          border: "none", borderRadius: 14, fontSize: 15, fontWeight: 700,
          fontFamily: "'DM Sans', sans-serif", letterSpacing: 0.3,
          cursor: (candidates.length === 0 || canSettle) ? "pointer" : "not-allowed",
          boxShadow: canSettle ? `0 10px 24px ${SUCCESS}40` : "none", transition: "all 0.2s",
        }}>
          {candidates.length === 0 ? "Done" : "Record Settlement"}
        </button>
      </div>
    </div>
  );
};

const NotificationsScreen = () => (
  <div style={{ flex: 1, overflow: "auto", background: GHOST }}>
    <div style={{ background: `linear-gradient(135deg, ${BLUE_DARK} 0%, ${BLUE_MID} 100%)`, padding: "20px 24px 24px" }}>
      <div style={{ color: WHITE, fontSize: 22, fontWeight: 800, fontFamily: "'Playfair Display', serif" }}>Activity</div>
      <div style={{ color: `${WHITE}80`, fontSize: 12, fontFamily: "'DM Sans', sans-serif", marginTop: 2 }}>Stay in the loop with what's happening</div>
    </div>
    <div style={{ padding: 20 }}>
      {NOTIFICATIONS_DATA.map(n => (
        <div key={n.id} style={{
          background: WHITE, borderRadius: 14, padding: 14, marginBottom: 10,
          display: "flex", alignItems: "flex-start", gap: 12, border: `1px solid ${GRAY100}`,
          ...(n.read ? {} : { borderLeft: `3px solid ${CRIMSON}` }),
        }}>
          <div style={{ fontSize: 22 }}>{n.icon}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, color: GRAY800, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.4 }}>{n.text}</div>
            <div style={{ fontSize: 11, color: GRAY400, fontFamily: "'DM Sans', sans-serif", marginTop: 4 }}>{n.time}</div>
          </div>
        </div>
      ))}
    </div>
  </div>
);

const ProfileScreen = ({ onLogout }) => (
  <div style={{ flex: 1, overflow: "auto", background: GHOST }}>
    <div style={{
      background: `linear-gradient(160deg, ${BLUE_DARK} 0%, ${CRIMSON_DARK} 100%)`,
      padding: "32px 24px 36px", display: "flex", flexDirection: "column", alignItems: "center",
    }}>
      <Avatar user={ME} size={64} />
      <div style={{ color: WHITE, fontSize: 20, fontWeight: 700, fontFamily: "'Playfair Display', serif", marginTop: 10 }}>{ME.name}</div>
      <div style={{ color: `${WHITE}70`, fontSize: 12, fontFamily: "'DM Sans', sans-serif", marginTop: 2 }}>asim@cybersquadnp.com</div>
    </div>
    <div style={{ padding: "18px 20px" }}>
      {[
        { icon: "👤", label: "Edit Profile" },
        { icon: "🔔", label: "Notification Preferences" },
        { icon: "💱", label: "Default Currency" },
        { icon: "🌙", label: "Appearance" },
        { icon: "🔒", label: "Security & Privacy" },
        { icon: "📊", label: "Analytics" },
        { icon: "📤", label: "Export Data" },
        { icon: "❓", label: "Help & Support" },
        { icon: "ℹ️", label: "About VaagBanda" },
      ].map((item, i) => (
        <div key={i} style={{
          display: "flex", alignItems: "center", gap: 14, padding: "13px 4px",
          borderBottom: `1px solid ${GRAY100}`, cursor: "pointer",
        }}>
          <span style={{ fontSize: 18 }}>{item.icon}</span>
          <span style={{ fontSize: 14, fontFamily: "'DM Sans', sans-serif", color: GRAY800, fontWeight: 500 }}>{item.label}</span>
          <span style={{ marginLeft: "auto", color: GRAY400, fontSize: 18 }}>›</span>
        </div>
      ))}
      <div onClick={onLogout} style={{
        display: "flex", alignItems: "center", gap: 14, padding: "14px 4px", cursor: "pointer", marginTop: 8,
      }}>
        <span style={{ fontSize: 18 }}>🚪</span>
        <span style={{ fontSize: 14, fontFamily: "'DM Sans', sans-serif", color: CRIMSON, fontWeight: 600 }}>Log Out</span>
      </div>
      <div style={{ textAlign: "center", marginTop: 24, color: GRAY400, fontSize: 11, fontFamily: "'DM Sans', sans-serif" }}>
        VaagBanda v1.0 · CyberSquadNp
        <br/>Dongshin University
      </div>
    </div>
  </div>
);

/* ─── MAIN APP ─── */
function VaagBandaApp() {
  const [authStage, setAuthStage] = useState("splash");
  const [screen, setScreen] = useState("home");
  const [activeTab, setActiveTab] = useState("home");
  const [groups, setGroups] = useState(INITIAL_GROUPS);
  const [selectedGroup, setSelectedGroup] = useState(null);
  const [scanPrefill, setScanPrefill] = useState(null);
  const [expensePrefill, setExpensePrefill] = useState(null);

  const navigate = (tab) => {
    setActiveTab(tab);
    setScreen(tab);
    setSelectedGroup(null);
  };

  const openGroup = (gid) => {
    setSelectedGroup(gid);
    setScreen("groupDetail");
  };

  const openAddExpense = () => {
    setScanPrefill(null);
    setScreen("addExpense");
  };

  const openScan = () => setScreen("scan");
  const openCreateGroup = () => setScreen("createGroup");
  const openSettle = () => { setExpensePrefill(null); setScreen("settle"); };
  const openSettleForExpense = (expense) => { setExpensePrefill(expense); setScreen("settle"); };

  const handleScanComplete = (prefill) => {
    setScanPrefill(prefill);
    setScreen("addExpense");
  };

  const handleSaveExpense = (groupId, expense) => {
    setGroups(prev => prev.map(g =>
      g.id === groupId ? { ...g, expenses: [expense, ...g.expenses] } : g
    ));
  };

  const handleCreateGroup = (newGroup) => {
    setGroups(prev => [...prev, newGroup]);
  };

  const handleSettle = (groupId, settlement) => {
    setGroups(prev => prev.map(g =>
      g.id === groupId ? { ...g, settlements: [...g.settlements, settlement] } : g
    ));
  };

  const closeOverlay = () => {
    setScanPrefill(null);
    setExpensePrefill(null);
    if (selectedGroup) setScreen("groupDetail");
    else setScreen(activeTab);
  };

  const currentGroup = groups.find(g => g.id === selectedGroup);
  const showTabBar = authStage === "app" && !["addExpense", "scan", "createGroup", "settle"].includes(screen);

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: `linear-gradient(160deg, ${BLUE_DARK} 0%, ${BLUE} 40%, ${CRIMSON_DARK} 100%)`,
      fontFamily: "'DM Sans', sans-serif", padding: "20px",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
      <style>{`
        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        input::placeholder { color: ${GRAY400}; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      `}</style>

      <div style={{ position: "fixed", top: 30, left: 0, right: 0, textAlign: "center", zIndex: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: `${WHITE}40`, letterSpacing: 4, textTransform: "uppercase", fontFamily: "'DM Sans', sans-serif" }}>VaagBanda</div>
        <div style={{ fontSize: 11, color: `${WHITE}25`, fontFamily: "'DM Sans', sans-serif", marginTop: 2 }}>Working Mockup · CyberSquadNp</div>
      </div>

      <PhoneFrame>
        {authStage === "splash" && <SplashScreen onDone={() => setAuthStage("login")} />}
        {authStage === "login" && (
          <LoginScreen onLogin={() => setAuthStage("app")} onGoToSignup={() => setAuthStage("signup")} />
        )}
        {authStage === "signup" && (
          <SignUpScreen onSignup={() => setAuthStage("app")} onGoToLogin={() => setAuthStage("login")} />
        )}

        {authStage === "app" && (
          <>
            {screen === "home" && (
              <HomeScreen groups={groups} onGroupTap={openGroup}
                onQuickAdd={openAddExpense} onQuickScan={openScan}
                onNewGroup={openCreateGroup} />
            )}
            {screen === "groups" && (
              <HomeScreen groups={groups} onGroupTap={openGroup}
                onQuickAdd={openAddExpense} onQuickScan={openScan}
                onNewGroup={openCreateGroup} />
            )}
            {screen === "groupDetail" && currentGroup && (
              <GroupDetailScreen
                group={currentGroup}
                onBack={() => { setScreen(activeTab); setSelectedGroup(null); }}
                onAddExpense={openAddExpense}
                onSettle={openSettle}
                onSettleExpense={openSettleForExpense}
              />
            )}
            {screen === "addExpense" && (
              <AddExpenseScreen
                groups={groups}
                defaultGroupId={selectedGroup || groups[0]?.id}
                prefill={scanPrefill}
                onClose={closeOverlay}
                onSave={handleSaveExpense}
                onOpenScan={openScan}
              />
            )}
            {screen === "scan" && (
              <ScanReceiptScreen
                onClose={closeOverlay}
                onScanComplete={handleScanComplete}
              />
            )}
            {screen === "createGroup" && (
              <CreateGroupScreen
                onClose={closeOverlay}
                onCreate={handleCreateGroup}
              />
            )}
            {screen === "settle" && currentGroup && (
              <SettleUpScreen
                group={currentGroup}
                expensePrefill={expensePrefill}
                onClose={closeOverlay}
                onSettle={handleSettle}
              />
            )}
            {screen === "notifications" && <NotificationsScreen />}
            {screen === "profile" && <ProfileScreen onLogout={() => setAuthStage("login")} />}
            {showTabBar && (
              <TabBar
                active={screen === "groupDetail" ? "groups" : activeTab}
                onNavigate={navigate}
                onAddPress={openAddExpense}
              />
            )}
          </>
        )}
      </PhoneFrame>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<VaagBandaApp />);

requestAnimationFrame(() => {
  const el = document.getElementById("loading");
  if (el) { el.classList.add("hide"); setTimeout(() => el.remove(), 500); }
});
</script>
</body>
</html>
